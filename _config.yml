# twitter_username: benleppke
# facebook_username: benleppke

# Build settings
# theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap

exclude:
  - README.md
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

